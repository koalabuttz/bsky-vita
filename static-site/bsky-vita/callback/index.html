<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Signing in to bsky-vita…</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #15171a; color: #e4e6eb; margin: 0; padding: 0;
      min-height: 100vh; display: grid; place-items: center; text-align: center; }
    main { max-width: 28rem; padding: 2rem; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; color: #1d9bf0; }
    p { font-size: 1rem; line-height: 1.5; margin: 0.75rem 0; color: #c2c6ca; }
    a { color: #1d9bf0; }
    #fallback { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>Signing you in…</h1>
    <p id="status">Forwarding to bsky-vita's broker.</p>
    <p id="fallback">If you're not redirected automatically,
      <a id="manual-link" href="#">tap here</a> to continue.</p>
  </main>

  <script>
    // OAuth redirect lands here from bsky.social. We immediately forward
    // (code, state, iss) to the bsky-vita broker, which the user's Vita
    // is polling. This page is intentionally trivial — no analytics, no
    // logging, no third-party scripts; the static host (davidlewis.xyz)
    // never sees the OAuth code in any retained form.
    //
    // If you self-host the broker, change BROKER_URL below to your own
    // Worker URL and rebuild your bsky-vita VPK with a matching constant.
    var BROKER_URL = "https://bsky-vita-broker.koalabuttz.workers.dev/callback";

    var dest = BROKER_URL + window.location.search;
    var manualLink = document.getElementById("manual-link");
    manualLink.href = dest;
    document.getElementById("fallback").style.display = "block";

    // Replace (not push) so the browser back-button doesn't re-trigger
    // the redirect.
    window.location.replace(dest);
  </script>

  <noscript>
    <p style="text-align:center; color:#c2c6ca; padding: 2rem;">
      JavaScript is required to complete the sign-in handoff.
    </p>
  </noscript>
</body>
</html>
